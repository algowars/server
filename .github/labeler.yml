    - any-glob-to-any-file: ['**/Migrations/**', '**/DbContext*', '**/*.sql']

dependencies:
  - changed-files:
    - any-glob-to-any-file: ['**/*.csproj', '**/Directory.Packages.props', '**/NuGet.Config']