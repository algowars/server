name: PR Labeler & Triage

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from labeler.yml
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  size:
    name: Apply size label
    runs-on: ubuntu-latest

    steps:
      - name: Apply size label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: size/XS
          xs_max_size: 10
          s_label: size/S
          s_max_size: 50
          m_label: size/M
          m_max_size: 200
          l_label: size/L
          l_max_size: 500
          xl_label: size/XL
          xl_max_size: 1000
          fail_if_xl: false
          message_if_xl: >
            This PR is very large. Please consider splitting it into smaller PRs
            to make it easier to review.

  triage:
    name: Mark new PRs as needs-triage
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'

    steps:
      - name: Add needs-triage label
        run: gh pr edit "$PR_URL" --add-label "needs-triage"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
