name: Build and Test

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: '10.0.x'
      project-path:
        required: false
        type: string
        default: './Algowars.Api/Algowars.Api.csproj'
      publish-output-path:
        required: false
        type: string
        default: './publish'
      upload-artifact:
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}

      - name: Build
        run: dotnet build ${{ inputs.project-path }} --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ./Algowars.Domain.Tests/Algowars.Domain.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Publish
        if: ${{ inputs.upload-artifact }}
        run: dotnet publish ${{ inputs.project-path }} --configuration Release --output ${{ inputs.publish-output-path }} --no-build

      - name: Upload artifact
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ${{ inputs.publish-output-path }}
